<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="birdGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7D46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="140" r="120" fill="#E8F5E9" opacity="0.5"/>
  
  <!-- Sound waves -->
  <path d="M 240 100 Q 270 140 240 180" stroke="url(#waveGradient)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 260 80 Q 300 140 260 200" stroke="url(#waveGradient)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 280 60 Q 330 140 280 220" stroke="url(#waveGradient)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Bird body -->
  <ellipse cx="160" cy="145" rx="55" ry="40" fill="url(#birdGradient)"/>
  
  <!-- Bird head -->
  <circle cx="205" cy="120" r="30" fill="url(#birdGradient)"/>
  
  <!-- Beak -->
  <polygon points="235,118 260,125 235,132" fill="#FF9800"/>
  
  <!-- Eye -->
  <circle cx="215" cy="115" r="8" fill="white"/>
  <circle cx="217" cy="114" r="4" fill="#1B5E30"/>
  
  <!-- Wing -->
  <ellipse cx="145" cy="150" rx="35" ry="22" fill="#1B5E30" opacity="0.7"/>
  
  <!-- Tail feathers -->
  <polygon points="95,135 60,120 65,145 60,170 95,155" fill="url(#birdGradient)"/>
  
  <!-- Legs -->
  <line x1="150" y1="180" x2="145" y2="210" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="180" x2="175" y2="210" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Feet -->
  <path d="M 135 210 L 145 210 L 155 210" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 165 210 L 175 210 L 185 210" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="265" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#1B5E30" text-anchor="middle">SongSage</text>
</svg>
